experiment_name: mirabest_diffusion_v1
seed: 42
device: cuda

data:
  # dataset: crumb
  dataset: mirabest_fits
  batch_size: 8
  num_workers: 4
  input_size: 150

model:
  backbone: resnet50
  pretrained: true
  num_layers: 18
  embedding_dim: 256
  dropout: 0.2
  checkpoint_dir: ./checkpoints

training:
  # tuned params
  learning_rate: 9.047404010598482e-05
  label_dropout: 0.11956635677389038
  weight_decay: 0.0007254860307195132
  embedding_dim: 256

  epochs: 200
  num_train_timesteps: 1000
  optimizer: adamw

  # accelerator
  mixed_precision: no
  gradient_accumulation_steps: 4
  output_dir: output

  scheduler:
    type: cosine
    warmup_epochs: 5
  early_stopping:
    patience: 10
    delta: 0.001
  save_best_only: true
  log_interval: 10
  eval_interval: 10
  eval_num_samples: 64

optimization:
  max_trials: 25
  parameters:
    learning_rate: { min: 0.000001, max: 0.0001, log: true }
    label_dropout: { min: 0.05, max: 0.30 }
    weight_decay: { min: 0.0001, max: 0.1, log: true }
    embedding_dim: { choices: [128, 256, 512] }

evaluation:
  metrics: [accuracy, precision, recall, f1]
  save_predictions: true
  output_dir: ./results
