experiment_name: mirabest_diffusion_v1
seed: 42
device: cuda

data:
  num_classes: 2
  batch_size: 8
  num_workers: 4
  input_size: 224

model:
  type: classifier # options: classifier, robust_classifier, diffuser, integrated_diffusion
  backbone: resnet50
  pretrained: true
  num_layers: 18
  embedding_dim: 256
  dropout: 0.2
  checkpoint_dir: ./checkpoints

training:
  epochs: 20
  learning_rate: 0.0005
  optimizer: adamw
  weight_decay: 0.01
  scheduler:
    type: cosine
    warmup_epochs: 5
  early_stopping:
    patience: 10
    delta: 0.001
  save_best_only: true
  log_interval: 10

optimization:
  method: bayesian
  max_trials: 25
  parameters:
    learning_rate: { min: 0.0001, max: 0.01, log: true }
    weight_decay: { min: 0.00001, max: 0.1 }
    dropout: { min: 0.1, max: 0.5 }

evaluation:
  metrics: [accuracy, precision, recall, f1]
  save_predictions: true
  output_dir: ./results
