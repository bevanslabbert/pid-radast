experiment_name: mirabest_diffusion_v1
seed: 42
device: cuda

data:
  dataset: crumb
  batch_size: 16
  num_workers: 4
  input_size: 224

model:
  type: classifier # options: classifier, robust_classifier, diffuser, integrated_diffusion
  backbone: resnet50
  pretrained: true
  num_layers: 18
  embedding_dim: 256
  dropout: 0.2
  checkpoint_dir: ./checkpoints

training:
  learning_rate: 1.6850506699025968e-05
  weight_decay: 0.009500082335089189
  batch_size: 8
  epochs: 100
  optimizer: adamw
  scheduler:
    type: cosine
    warmup_epochs: 5
  early_stopping:
    patience: 30
    delta: 0.001
  save_best_only: true
  log_interval: 10

optimization:
  method: bayesian
  max_trials: 25
  parameters:
    learning_rate: { min: 0.00001, max: 0.01, log: true }
    weight_decay: { min: 0.00001, max: 0.1, log: true }
    batch_size: { choices: [8, 16, 32] }

evaluation:
  metrics: [accuracy, precision, recall, f1]
  save_predictions: true
  output_dir: ./results
