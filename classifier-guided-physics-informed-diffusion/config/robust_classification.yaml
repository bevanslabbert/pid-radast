experiment_name: mirabest_robust_classification_v1
seed: 42
device: cuda

data:
  dataset: crumb
  batch_size: 16
  num_workers: 4
  input_size: 150

model:
  backbone: resnet50
  pretrained: true
  checkpoint_dir: ./checkpoints

training:
  epochs: 300
  warmup_epochs: 20 # train on clean images only before adversarial training starts
  transition_epochs: 15 # ramp epsilon from 25% to 100% before full adversarial training
  label_smoothing: 0.05 # reduced from 0.1; small dataset benefits from less smoothing
  learning_rate: 0.01 # SGD lr; warmed up linearly over first 5 epochs then cosine-annealed
  weight_decay: 0.0005
  num_timesteps: 1000
  trades_beta: 6.0 # TRADES KL regularisation weight (Zhang et al., 2019)

  # PGD adversarial attack parameters
  momentum: 0.9

  pgd:
    epsilon: 0.03 # l-inf perturbation budget (in [-1,1] pixel space)
    alpha: 0.01 # step size per PGD iteration
    num_steps: 20 # increased from 10; stronger attacks produce more robust models
    random_start: true # random delta initialisation (stronger attacks; recommended)

optimization:
  method: bayesian
  max_trials: 25
  parameters:
    learning_rate: { min: 0.0001, max: 0.1, log: true }
    weight_decay: { min: 0.00001, max: 0.01, log: true }
    momentum: { min: 0.85, max: 0.99 }
    warmup_epochs: { choices: [10, 20, 30] }
    transition_epochs: { choices: [10, 15, 20] }
    trades_beta: { min: 1.0, max: 10.0 }
    "pgd.epsilon": { min: 0.01, max: 0.1, log: true }
    "pgd.alpha": { min: 0.001, max: 0.02, log: true }
    "pgd.num_steps": { choices: [10, 20, 40] }

evaluation:
  metrics: [accuracy, precision, recall, f1]
  save_predictions: true
  output_dir: ./results
