experiment_name: mirabest_robust_classifier_guided_diffusion_v1
seed: 42
device: cuda

data:
  dataset: mirabest_fits
  batch_size: 8
  num_workers: 4
  input_size: 150

model:
  backbone: resnet50
  pretrained: true
  num_layers: 18
  embedding_dim: 256
  dropout: 0.2
  checkpoint_dir: ./checkpoints
  # loads from checkpoints/diffusion by default; override to use a different starting point
  pretrained_checkpoint: checkpoints/diffusion

training:
  epochs: 200
  learning_rate: 0.00005
  label_dropout: 0.29869287822764246
  num_train_timesteps: 1000
  optimizer: adamw

  # weight applied to the robust classifier guidance loss term:
  # loss = MSE(noise_pred, noise) + lambda_cls * CE(classifier(x_0_pred), labels)
  lambda_cls: 0.1

  guidance_scale: 7.5

  mixed_precision: no
  gradient_accumulation_steps: 4
  output_dir: output

  weight_decay: 0.01
  scheduler:
    type: cosine
    warmup_epochs: 5
  early_stopping:
    patience: 10
    delta: 0.001
  save_best_only: true
  log_interval: 10
  eval_interval: 10
  eval_num_samples: 64

optimization:
  method: bayesian
  max_trials: 25
  parameters:
    learning_rate: { min: 0.000001, max: 0.0001, log: true }
    weight_decay: { min: 0.00001, max: 0.1, log: true }
    label_dropout: { min: 0.05, max: 0.30 }
    lambda_cls: { min: 0.01, max: 1.0, log: true }
    guidance_scale: { min: 3.0, max: 15.0 }

evaluation:
  metrics: [accuracy, precision, recall, f1]
  save_predictions: true
  output_dir: ./results
